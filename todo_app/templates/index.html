<!DOCTYPE html>
<html>
<head>
    <title>To-Do App</title>
</head>
<body>

    <h2>📝 My To-Do List</h2>

    <!-- Add Task Form -->
    <form method="POST">
        <input type="text" name="task" placeholder="Enter task">
        <button type="submit">Add</button>
    </form>

    <!-- Display Tasks -->
    <ul>
        {% for task in tasks %}
            <li>
                {{ task }}
                <a href="/delete/{{ loop.index0 }}">❌</a>
            </li>
        {% endfor %}
    </ul>

</body>
</html>
